<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="assets/css/style.min.css" />
  </head>
  <body>
    <div id="header"></div>
    <main>
      <div class="accueil">
        <section class="accueil__hero">
          <div class="accueil__hero__overlay" aria-hidden="true"></div>
          <div class="accueil__hero__curtain">
            <img class="accueil__hero__curtain__left" src="/assets/img/rideau-gauche.webp" alt="" />
            <img class="accueil__hero__curtain__right" src="/assets/img/rideau-droit.webp" alt="" />
          </div>
          <div class="accueil__hero__content">
            <span>LE PHOSPHORE</span>
            <h1>
              Vibrez. Partagez. <br />
              Émerveillez-vous.
            </h1>
            <p>Théâtre, stand-up, concerts : une programmation vivante au cœur de la ville.</p>
            <a href="pages/programmation.html" class="accueil__hero__cta">Voir la programmation</a>
          </div>
        </section>
        <section class="accueil__featured-shows">
          <div class="accueil__featured-shows__text">
            <h3>À l'affiche</h3>
            <span>Trois spectacles à ne pas manquer cette semaine</span>
          </div>

          <!-- js cards -->
          <div></div>
        </section>
      </div>
      <div id="footer"></div>
    </main>
    <!-- JavaScript dependencies -->
    <!-- GSAP library -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="assets/js/script.js"></script>
  </body>
</html>
