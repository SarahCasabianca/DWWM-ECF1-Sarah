<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Le Phosphore | Théâtre, concerts et stand-up à Marseille</title>
    <link rel="stylesheet" href="/assets/css/style.min.css" />
  </head>
  <body>
    <!-- Insert header -->
    <div id="header"></div>
    <main>
      <!-- Hero with curtain animation -->
      <div class="accueil">
        <section class="accueil__hero">
          <div class="accueil__hero__overlay" aria-hidden="true"></div>
          <div class="accueil__hero__curtain">
            <img
              class="accueil__hero__curtain__left"
              src="/assets/img/rideau-gauche.webp"
              alt="image d'une moitié de rideau rouge"
            />
            <img
              class="accueil__hero__curtain__right"
              src="/assets/img/rideau-droit.webp"
              alt="image d'une moitié de rideau rouge"
            />
          </div>
          <div class="accueil__hero__content">
            <span>LE PHOSPHORE</span>
            <h1>
              Vibrez. Partagez. <br />
              Émerveillez-vous.
            </h1>
            <p>Théâtre, stand-up, concerts : une programmation vivante au cœur de la ville.</p>
            <a href="pages/programmation.html" class="accueil__hero__cta">Voir la programmation</a>
          </div>
        </section>

        <!-- Featured shows -->
        <section class="accueil__featured-shows">
          <div class="accueil__featured-shows__text">
            <h2>À l'affiche</h2>
            <span>Trois spectacles à ne pas manquer cette semaine</span>
          </div>

          <!-- Js cards -->
          <div class="accueil__featured-shows__cards" id="featured-cards"></div>
        </section>
      </div>

      <!-- Insert footer -->
      <div id="footer"></div>
    </main>

    <!-- Js dependencies -->
    <!-- GSAP library -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="/assets/js/script.js"></script>
  </body>
</html>
