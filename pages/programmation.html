<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Programmation</title>
    <link rel="stylesheet" href="/assets/css/style.min.css" />
  </head>
  <body class="programmation">
    <div id="header"></div>

    <div class="programmation__body">
      <!-- Tittle section -->
      <section class="programmation__text" aria-label="Titres">
        <h1>Programmation</h1>
        <p>Théâtre, stand-up et concerts à venir.</p>
      </section>

      <!-- Filters -->
      <section class="programmation__filters" aria-label="Filtres">
        <div class="programmation__filters__buttons">
          <div class="programmation__filters__buttons__left">
            <p>TYPE</p>
            <a href="#" data-type="all">Tous</a>
            <a href="#" data-type="theatre">Théâtre</a>
            <a href="#" data-type="standup">Stand-up</a>
            <a href="#" data-type="concert">Concert</a>
          </div>
          <div class="programmation__filters__buttons__right">
            <p>DATE</p>
            <a href="#" data-date="all">Toutes</a>
            <a href="#" data-date="2026-06-20">Ven 20</a>
            <a href="#" data-date="2026-06-21">Sam 21</a>
            <a href="#" data-date="2026-06-22">Dim 22</a>
          </div>
        </div>
        <div class="programmation__checkbox">
          <input type="checkbox" id="soldout" />
          <label for="soldout">Masquer les spectacles complets</label>
        </div>
      </section>

      <!-- Cards -->
      <section>
        <div></div>
      </section>
    </div>
    <div id="footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="/assets/js/script.js"></script>
  </body>
</html>
