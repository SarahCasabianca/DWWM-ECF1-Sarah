<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Programmation des spectacles | Le Phosphore</title>
    <link rel="stylesheet" href="/assets/css/style.min.css" />
  </head>
  <body class="programmation">
    <!-- Insert header -->
    <div id="header"></div>

    <div class="programmation__body">
      <!-- Tittle section -->
      <section class="programmation__text">
        <h1>Programmation</h1>
        <p>Théâtre, stand-up et concerts à venir.</p>
      </section>

      <!-- Filters -->
      <section class="programmation__filters">
        <div class="programmation__filters__buttons">
          <div class="programmation__filters__buttons__left">
            <p>TYPE</p>
            <button type="button" data-type="all">Tous</button>
            <button type="button" data-type="theatre">Théâtre</button>
            <button type="button" data-type="standup">Stand-up</button>
            <button type="button" data-type="concert">Concert</button>
          </div>
          <div class="programmation__filters__buttons__right">
            <p>DATE</p>
            <button type="button" data-date="all">Toutes</button>
            <button type="button" data-date="2026-06-20">Ven 20</button>
            <button type="button" data-date="2026-06-21">Sam 21</button>
            <button type="button" data-date="2026-06-22">Dim 22</button>
          </div>
        </div>
        <div class="programmation__checkbox">
          <input type="checkbox" id="soldout" />
          <label for="soldout">Masquer les spectacles complets</label>
        </div>
      </section>

      <!-- Cards -->
      <section class="programmation__cards"></section>
    </div>

    <!-- Insert footer -->
    <div id="footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="/assets/js/script.js"></script>
  </body>
</html>
